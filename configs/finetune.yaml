# Stage 3: Self-supervised contrastive fine-tuning configuration
model:
  name: "ViT-B-32"
  pretrained: "openai"
  unfreeze_blocks: 2

training:
  optimizer: "adamw"
  lr: 1.0e-5
  weight_decay: 0.01
  scheduler: "cosine_annealing"
  warmup_steps: 100
  epochs: 20
  batch_size: 16
  temperature: 0.07
  max_grad_norm: 1.0
  fp16: true
  patience: 5

data:
  manifest_path: "data/manifest.json"
  image_size: 224

text_anchors_config: "configs/text_anchors.yaml"
checkpoint_dir: "checkpoints"
log_path: "results/training_log.csv"
